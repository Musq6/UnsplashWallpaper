name: Build Python Qt App with PyInstaller

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PyQt5 pillow  

      - name: Run PyInstaller via build.py
        run: |
          python build.py  

      - name: Rename Windows output
        run: |
          mv dist/UnsplashWallpaper.exe dist/UnsplashWallpaper-windows.exe
          zip -j dist/UnsplashWallpaper-windows.zip dist/UnsplashWallpaper-windows.exe icon.ico

      - name: Check dist directory
        run: |
          dir dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/UnsplashWallpaper-windows.zip
