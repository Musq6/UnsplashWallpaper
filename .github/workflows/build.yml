name: Build Python Qt App with PyInstaller

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
      runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PyQt5 pillow  # 添加Pillow用于生成图标[你的脚本]

      - name: Run PyInstaller via build.py
        run: |
          python build.py  # 直接执行你的编译脚本[你的脚本]

      - name: Rename Windows output
        run: |
          mv dist/UnsplashWallpaper.exe dist/UnsplashWallpaper-windows.exe
          zip -j dist/UnsplashWallpaper-windows.zip dist/UnsplashWallpaper-windows.exe icon.ico  # 打包exe和图标[你的脚本]

      
      - name: check dir
        run: |
          dir dist

      - name: release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/UnsplashWallpaper.exe
