name: Build 

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug context variables
        run: |
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_EVENT_NAME: ${{ github.event_name }}"
          echo "GITHUB_REF_TYPE: ${{ github.ref_type }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir pyinstaller PyQt5 pillow  

      - name: Run PyInstaller via build.py
        run: |
          python build.py  

      - name: Rename Windows output
        run: |
          Move-Item -Path "dist/UnsplashWallpaper.exe" -Destination "dist/UnsplashWallpaper-windows.exe"
          Compress-Archive -Path "dist/UnsplashWallpaper-windows.exe", "icon.ico" -DestinationPath "dist/UnsplashWallpaper-windows.zip" -Force

      - name: Check dist directory
        run: |
          dir dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: true
        with:
          files: dist/UnsplashWallpaper-windows.zip
